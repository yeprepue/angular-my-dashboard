<!-- Forgot Password Component Template -->
<div class="min-h-screen bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-8">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">Pre-Salud</h1>
      <p class="text-gray-600">Recuperar Contraseña</p>
    </div>

    <!-- Success Message -->
    <div
      *ngIf="successMessage"
      class="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm"
      role="alert"
    >
      <p class="font-semibold">¡Éxito!</p>
      <p>{{ successMessage }}</p>
    </div>

    <!-- Error Message -->
    <div
      *ngIf="errorMessage"
      class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"
      role="alert"
    >
      <p class="font-semibold">Error</p>
      <p>{{ errorMessage }}</p>
    </div>

    <!-- Info -->
    <div class="mb-6 p-4 bg-blue-50 border border-blue-200 rounded-lg text-blue-700 text-sm">
      <p>Ingresa tu correo electrónico y te enviaremos un enlace para recuperar tu contraseña.</p>
    </div>

    <!-- Form -->
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <!-- Email Input -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
          Correo Electrónico
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="tu@email.com"
          [class.border-red-500]="isFieldInvalid('email')"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
          autocomplete="email"
          [disabled]="isLoading"
        />
        <p *ngIf="isFieldInvalid('email')" class="mt-1 text-sm text-red-600">
          {{ getFieldError('email') }}
        </p>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="isLoading || forgotPasswordForm.invalid"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center"
      >
        <span *ngIf="!isLoading">Enviar Enlace</span>
        <span *ngIf="isLoading" class="flex items-center">
          <span class="animate-spin mr-2">⏳</span>
          Enviando...
        </span>
      </button>

      <!-- Back to Login -->
      <p class="text-center text-gray-700 text-sm">
        <button
          type="button"
          (click)="goToLogin()"
          class="text-blue-600 hover:text-blue-700 font-semibold"
          [disabled]="isLoading"
        >
          Volver a Iniciar Sesión
        </button>
      </p>
    </form>

    <!-- Footer -->
    <div class="mt-8 pt-6 border-t border-gray-200">
      <p class="text-center text-xs text-gray-500">
        © 2024 Pre-Salud. Todos los derechos reservados.
      </p>
    </div>
  </div>
</div>
