<!-- Reset Password Component Template -->
<div class="min-h-screen bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-8">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">Pre-Salud</h1>
      <p class="text-gray-600">Cambiar Contraseña</p>
    </div>

    <!-- Success Message -->
    <div
      *ngIf="successMessage"
      class="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm"
      role="alert"
    >
      <p class="font-semibold">¡Éxito!</p>
      <p>{{ successMessage }}</p>
    </div>

    <!-- Error Message -->
    <div
      *ngIf="errorMessage"
      class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"
      role="alert"
    >
      <p class="font-semibold">Error</p>
      <p>{{ errorMessage }}</p>
    </div>

    <!-- Info -->
    <div class="mb-6 p-4 bg-blue-50 border border-blue-200 rounded-lg text-blue-700 text-sm">
      <p>Ingresa tu nueva contraseña. Asegúrate de que sea fuerte y segura.</p>
    </div>

    <!-- Form -->
    <form [formGroup]="resetPasswordForm" (ngSubmit)="onResetPassword()" class="space-y-5">
      <!-- New Password -->
      <div>
        <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-2">
          Nueva Contraseña
        </label>
        <div class="relative">
          <input
            id="newPassword"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="newPassword"
            placeholder="••••••••"
            [class.border-red-500]="isFieldInvalid('newPassword')"
            class="w-full px-4 py-2 pr-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
            autocomplete="new-password"
            [disabled]="isLoading"
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute right-3 top-3 text-gray-600 hover:text-gray-800"
            [disabled]="isLoading"
          >
            <span *ngIf="!showPassword">👁️</span>
            <span *ngIf="showPassword">🙈</span>
          </button>
        </div>
        <p *ngIf="isFieldInvalid('newPassword')" class="mt-1 text-sm text-red-600">
          {{ getFieldError('newPassword') }}
        </p>
      </div>

      <!-- Confirm Password -->
      <div>
        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">
          Confirmar Contraseña
        </label>
        <div class="relative">
          <input
            id="confirmPassword"
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="••••••••"
            [class.border-red-500]="isFieldInvalid('confirmPassword') || hasPasswordMismatch()"
            class="w-full px-4 py-2 pr-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
            autocomplete="new-password"
            [disabled]="isLoading"
          />
          <button
            type="button"
            (click)="toggleConfirmPasswordVisibility()"
            class="absolute right-3 top-3 text-gray-600 hover:text-gray-800"
            [disabled]="isLoading"
          >
            <span *ngIf="!showConfirmPassword">👁️</span>
            <span *ngIf="showConfirmPassword">🙈</span>
          </button>
        </div>
        <p *ngIf="hasPasswordMismatch()" class="mt-1 text-sm text-red-600">
          Las contraseñas no coinciden
        </p>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="isLoading || resetPasswordForm.invalid"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center"
      >
        <span *ngIf="!isLoading">Cambiar Contraseña</span>
        <span *ngIf="isLoading" class="flex items-center">
          <span class="animate-spin mr-2">⏳</span>
          Guardando...
        </span>
      </button>

      <!-- Back to Login -->
      <p class="text-center text-gray-700 text-sm">
        <button
          type="button"
          (click)="goToLogin()"
          class="text-blue-600 hover:text-blue-700 font-semibold"
          [disabled]="isLoading"
        >
          Volver a Iniciar Sesión
        </button>
      </p>
    </form>

    <!-- Footer -->
    <div class="mt-8 pt-6 border-t border-gray-200">
      <p class="text-center text-xs text-gray-500">
        © 2024 Pre-Salud. Todos los derechos reservados.
      </p>
    </div>
  </div>
</div>
