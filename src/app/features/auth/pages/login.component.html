<!-- Login Component Template -->
<div class="min-h-screen bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-8">
    <!-- Logo/Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">Pre-Salud</h1>
      <p class="text-gray-600">Bienvenido de nuevo</p>
    </div>

    <!-- Error Message -->
    <div
      *ngIf="errorMessage"
      class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"
      role="alert"
    >
      <p class="font-semibold">Error</p>
      <p>{{ errorMessage }}</p>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-5">
      <!-- Email Input -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
          Correo Electrónico
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="tu@email.com"
          [class.border-red-500]="isFieldInvalid('email')"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
          autocomplete="email"
        />
        <p *ngIf="isFieldInvalid('email')" class="mt-1 text-sm text-red-600">
          {{ getFieldError('email') }}
        </p>
      </div>

      <!-- Password Input -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
          Contraseña
        </label>
        <div class="relative">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••"
            [class.border-red-500]="isFieldInvalid('password')"
            class="w-full px-4 py-2 pr-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
            autocomplete="current-password"
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute right-3 top-3 text-gray-600 hover:text-gray-800"
            [disabled]="isLoading"
          >
            <span *ngIf="!showPassword">👁️</span>
            <span *ngIf="showPassword">🙈</span>
          </button>
        </div>
        <p *ngIf="isFieldInvalid('password')" class="mt-1 text-sm text-red-600">
          {{ getFieldError('password') }}
        </p>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center">
          <input type="checkbox" class="w-4 h-4 rounded border-gray-300" [disabled]="isLoading" />
          <span class="ml-2 text-gray-700">Recuérdame</span>
        </label>
        <button
          type="button"
          (click)="goToForgotPassword()"
          class="text-blue-600 hover:text-blue-700 font-medium"
          [disabled]="isLoading"
        >
          ¿Olvidó contraseña?
        </button>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="isLoading || loginForm.invalid || loginForm.disabled"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center"
      >
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading" class="flex items-center">
          <span class="animate-spin mr-2">⏳</span>
          Cargando...
        </span>
      </button>

      <!-- Register Link -->
      <p class="text-center text-gray-700 text-sm">
        ¿No tienes cuenta?
        <button
          type="button"
          (click)="goToRegister()"
          class="text-blue-600 hover:text-blue-700 font-semibold"
          [disabled]="isLoading"
        >
          Regístrate aquí
        </button>
      </p>
    </form>

    <!-- Footer -->
    <div class="mt-8 pt-6 border-t border-gray-200">
      <p class="text-center text-xs text-gray-500">
        © 2024 Pre-Salud. Todos los derechos reservados.
      </p>
      <p class="text-center text-xs text-gray-500 mt-2">
        ISO 27001 Compliant | Datos encriptados
      </p>
    </div>
  </div>
</div>
